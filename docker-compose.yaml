services:
  # 백엔드 서비스 설정
  backend:
    build:
      context: ./clover    # clover 폴더 안에 있는 Dockerfile을 빌드합니다
    ports:
      - "8000:8000"        # 내 컴퓨터의 8000포트 : 컨테이너의 8000포트 연결
    env_file:
      - ./clover/.env      # 기존에 사용하시던 .env 환경변수 파일 연동
    restart: always

  # 프론트엔드 서비스 설정
  frontend:
    build:
      context: ./lucky     # lucky 폴더 안에 있는 Dockerfile을 빌드합니다
    ports:
      - "3000:3000"        # 내 컴퓨터의 3000포트 : 컨테이너의 3000포트 연결
    restart: always
